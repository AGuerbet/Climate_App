<!DOCTYPE html>
<html>
<head>
    <title>Climate Trends Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Climate Trends Explorer</h1>

<label>Latitude:</label>
<input id="lat" value="24.5">

<label>Longitude:</label>
<input id="lon" value="121.0">

<button onclick="loadData()">Load Climate Data</button>

<div id="output"></div>

<canvas id="tempChart"></canvas>
<canvas id="rainChart"></canvas>
<canvas id="extremeChart"></canvas>

<script>

let tempChart;
let rainChart;
let extremeChart;

function linearRegression(x, y) {
    const n = x.length;

    let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

    for (let i = 0; i < n; i++) {
        sumX += x[i];
        sumY += y[i];
        sumXY += x[i] * y[i];
        sumXX += x[i] * x[i];
    }

    const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
    const intercept = (sumY - slope * sumX) / n;

    return {
        slope,
        trend: x.map(xi => slope * xi + intercept)
    };
}

function interpret(type, slope) {

    if (type === "temperature") {
        return slope > 0
            ? `🔥 Warming trend: +${slope.toFixed(4)} °C/year`
            : `❄️ Cooling trend: ${slope.toFixed(4)} °C/year`;
    }

    if (type === "rainfall") {
        return slope > 0
            ? `🌧️ Increasing rainfall: +${slope.toFixed(2)} mm/year`
            : `🏜️ Decreasing rainfall: ${slope.toFixed(2)} mm/year`;
    }

    if (type === "extremes") {
        return slope > 0
            ? `⚠️ Increase in extreme heat days`
            : `Decrease in extreme heat days`;
    }
}

function loadData() {

    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    const url = `https://climate-app-e1fc.onrender.com/climate-fast?lat=${lat}&lon=${lon}`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        if (!data || !data.temperature_mean) {
            alert("No data returned");
            return;
        }

        const years = Object.keys(data.temperature_mean).map(Number);

        const tempMean = Object.values(data.temperature_mean);
        const tempMax = Object.values(data.temperature_max);
        const rains = Object.values(data.rainfall);
        const soil = Object.values(data.soil_moisture);
        const hotDays = Object.values(data.hot_days);

        const tempRes = linearRegression(years, tempMean);
        const rainRes = linearRegression(years, rains);
        const extremeRes = linearRegression(years, hotDays);

        if (tempChart) tempChart.destroy();
        if (rainChart) rainChart.destroy();
        if (extremeChart) extremeChart.destroy();

        tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    { label: 'Mean Temp', data: tempMean, borderColor: 'red' },
                    { label: 'Max Temp', data: tempMax, borderColor: 'orange' },
                    { label: 'Trend', data: tempRes.trend, borderColor: 'black', borderWidth: 2 }
                ]
            }
        });

        rainChart = new Chart(document.getElementById('rainChart'), {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    { label: 'Rainfall', data: rains, borderColor: 'blue' },
                    { label: 'Soil Moisture', data: soil, borderColor: 'green' },
                    { label: 'Trend', data: rainRes.trend, borderColor: 'black', borderWidth: 2 }
                ]
            }
        });

        extremeChart = new Chart(document.getElementById('extremeChart'), {
            type: 'line',
            data: {
                labels: years,
                datasets: [
                    { label: 'Hot Days', data: hotDays, borderColor: 'purple' },
                    { label: 'Trend', data: extremeRes.trend, borderColor: 'black', borderWidth: 2 }
                ]
            }
        });

        document.getElementById("output").innerHTML = `
            <h2>Climate Interpretation</h2>
            <p>${interpret("temperature", tempRes.slope)}</p>
            <p>${interpret("rainfall", rainRes.slope)}</p>
            <p>${interpret("extremes", extremeRes.slope)}</p>
        `;

    })
    .catch(err => {
        alert("Error: " + err.message);
    });
}

</script>

</body>
</html>
