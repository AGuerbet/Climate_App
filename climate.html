<!DOCTYPE html>
<html>
<head>
    <title>Climate Trends Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:black;color:white;font-family:sans-serif">

<h1>Climate Trends Explorer (Scientific Mode)</h1>

<label>Latitude:</label>
<input id="lat" value="24.5">

<label>Longitude:</label>
<input id="lon" value="121.0">

<button onclick="loadData()">Load Climate Data</button>

<div id="output"></div>

<canvas id="tempChart"></canvas>
<canvas id="rainChart"></canvas>
<canvas id="extremeChart"></canvas>

<script>

let tempChart, rainChart, extremeChart;

function linearRegression(x, y) {
    const n = x.length;
    let sumX=0,sumY=0,sumXY=0,sumXX=0;

    for (let i=0;i<n;i++){
        sumX+=x[i];
        sumY+=y[i];
        sumXY+=x[i]*y[i];
        sumXX+=x[i]*x[i];
    }

    const slope=(n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX);
    const intercept=(sumY - slope*sumX)/n;

    return {
        slope,
        trend: x.map(xi => slope*xi + intercept)
    };
}

function loadData(){

    const lat=document.getElementById("lat").value;
    const lon=document.getElementById("lon").value;

    fetch(`https://climate-app-e1fc.onrender.com/climate-fast?lat=${lat}&lon=${lon}`)
    .then(res=>res.json())
    .then(data=>{

        if(!data.data){
            alert("No data");
            return;
        }

        const years=data.data.map(d=>d.year);

        const temp=data.data.map(d=>d.thermal.mean_temp);
        const tx90p=data.data.map(d=>d.thermal.tx90p);
        const tn10p=data.data.map(d=>d.thermal.tn10p);

        const rain=data.data.map(d=>d.hydrological.rain_total);
        const spi=data.data.map(d=>d.hydrological.spi);
        const r99p=data.data.map(d=>d.hydrological.r99p);

        const tempTrend=linearRegression(years,temp);
        const rainTrend=linearRegression(years,rain);

        if(tempChart) tempChart.destroy();
        if(rainChart) rainChart.destroy();
        if(extremeChart) extremeChart.destroy();

        tempChart=new Chart(document.getElementById("tempChart"),{
            type:"line",
            data:{
                labels:years,
                datasets:[
                    {label:"Mean Temperature",data:temp,borderColor:"red"},
                    {label:"Trend",data:tempTrend.trend,borderColor:"white",borderWidth:2}
                ]
            }
        });

        rainChart=new Chart(document.getElementById("rainChart"),{
            type:"line",
            data:{
                labels:years,
                datasets:[
                    {label:"Total Rainfall",data:rain,borderColor:"blue"},
                    {label:"Trend",data:rainTrend.trend,borderColor:"white",borderWidth:2}
                ]
            }
        });

        extremeChart=new Chart(document.getElementById("extremeChart"),{
            type:"line",
            data:{
                labels:years,
                datasets:[
                    {label:"TX90p (hot days %)",data:tx90p,borderColor:"orange"},
                    {label:"TN10p (cold days %)",data:tn10p,borderColor:"cyan"},
                    {label:"SPI",data:spi,borderColor:"green"},
                    {label:"R99p (extreme rainfall)",data:r99p,borderColor:"purple"}
                ]
            }
        });

        document.getElementById("output").innerHTML=`
            <h2>Scientific Interpretation</h2>
            <p>🔥 Temperature trend: ${tempTrend.slope.toFixed(4)} °C/year</p>
            <p>🌧️ Rainfall trend: ${rainTrend.slope.toFixed(2)} mm/year</p>
            <p>Baseline: ${data.baseline}</p>
        `;

    });
}

</script>

</body>
</html>
