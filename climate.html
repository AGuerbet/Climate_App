<!DOCTYPE html>
<html>
<head>
    <title>Climate Trends Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Climate Trends Explorer</h1>

<label>Latitude:</label>
<input id="lat" value="24.5">

<label>Longitude:</label>
<input id="lon" value="121.0">

<button onclick="loadData()">Load Climate Data</button>

<div id="output"></div>

<canvas id="tempChart"></canvas>
<canvas id="hydroChart"></canvas>
<canvas id="energyChart"></canvas>

<script>

let tempChart, hydroChart, energyChart;

function linearRegression(x, y) {
    const n = x.length;
    let sumX=0, sumY=0, sumXY=0, sumXX=0;

    for (let i=0;i<n;i++){
        sumX+=x[i];
        sumY+=y[i];
        sumXY+=x[i]*y[i];
        sumXX+=x[i]*x[i];
    }

    const slope = (n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX);
    const intercept = (sumY - slope*sumX)/n;

    return {
        slope,
        trend: x.map(xi => slope*xi + intercept)
    };
}

function interpret(type, slope){

    if(type==="temperature"){
        return slope>0
            ? `🔥 Warming: +${slope.toFixed(4)} °C/year`
            : `❄️ Cooling: ${slope.toFixed(4)} °C/year`;
    }

    if(type==="rain"){
        return slope>0
            ? `🌧️ Increasing rainfall`
            : `🏜️ Decreasing rainfall`;
    }

    if(type==="energy"){
        return slope>0
            ? `☀️ Increasing solar energy`
            : `Decreasing solar energy`;
    }
}

function loadData(){

    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    fetch(`https://climate-app-e1fc.onrender.com/climate-fast?lat=${lat}&lon=${lon}`)
    .then(res=>res.json())
    .then(data=>{

        if(!data || !data.temperature_mean){
            alert("No data returned");
            return;
        }

        const years = Object.keys(data.temperature_mean).map(Number);

        const tempMean = Object.values(data.temperature_mean);
        const tempMax = Object.values(data.temperature_max);
        const tempMin = Object.values(data.temperature_min);

        const rain = Object.values(data.rainfall);
        const humidity = Object.values(data.humidity);
        const radiation = Object.values(data.radiation);

        const tempRes = linearRegression(years,tempMean);
        const rainRes = linearRegression(years,rain);
        const radRes = linearRegression(years,radiation);

        if(tempChart) tempChart.destroy();
        if(hydroChart) hydroChart.destroy();
        if(energyChart) energyChart.destroy();

        // TEMPERATURE
        tempChart = new Chart(tempChart = document.getElementById('tempChart'),{
            type:'line',
            data:{
                labels:years,
                datasets:[
                    {label:'Mean',data:tempMean,borderColor:'red'},
                    {label:'Max',data:tempMax,borderColor:'orange'},
                    {label:'Min',data:tempMin,borderColor:'blue'},
                    {label:'Trend',data:tempRes.trend,borderColor:'black',borderWidth:2}
                ]
            }
        });

        // HYDRO
        hydroChart = new Chart(document.getElementById('hydroChart'),{
            type:'line',
            data:{
                labels:years,
                datasets:[
                    {label:'Rainfall',data:rain,borderColor:'blue'},
                    {label:'Humidity',data:humidity,borderColor:'green'},
                    {label:'Trend',data:rainRes.trend,borderColor:'black',borderWidth:2}
                ]
            }
        });

        // ENERGY
        energyChart = new Chart(document.getElementById('energyChart'),{
            type:'line',
            data:{
                labels:years,
                datasets:[
                    {label:'Radiation',data:radiation,borderColor:'gold'},
                    {label:'Trend',data:radRes.trend,borderColor:'black',borderWidth:2}
                ]
            }
        });

        document.getElementById("output").innerHTML = `
            <h2>Climate Interpretation</h2>
            <p>${interpret("temperature",tempRes.slope)}</p>
            <p>${interpret("rain",rainRes.slope)}</p>
            <p>${interpret("energy",radRes.slope)}</p>
        `;

    });
}

</script>

</body>
</html>
